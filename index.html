<!DOCTYPE html>
<html>
<head>
  <title>Nexus Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #0f2027, #2c5364);
      color: white;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background: rgba(255,255,255,0.1);
      padding: 8px;
      margin: 5px;
      border-radius: 10px;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
    }

    button {
      padding: 10px;
      background: #00c6ff;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" placeholder="Type message...">
  <button onclick="send()">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIRCz9Owin5QYjagjXWY3fG7Ua3NbFVsk",
  authDomain: "studio-6378666108-ea9e8.firebaseapp.com",
  databaseURL: "https://studio-6378666108-ea9e8-default-rtdb.firebaseio.com",
  projectId: "studio-6378666108-ea9e8",
  storageBucket: "studio-6378666108-ea9e8.firebasestorage.app",
  messagingSenderId: "1035429361471",
  appId: "1:1035429361471:web:145d3e9368820f4619458a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messaging = getMessaging(app);

const VAPID = "BN2ugAl_z_YpuplZcjgnxcrigaOvCQ0x6FLBxcx-YtpvS-qt-uRr5f5xv9FJa-5aJoUyouh36hnnULJxUjQ0Bcw";

// 🔔 Request notification permission
Notification.requestPermission().then(async (perm) => {
  if (perm === "granted") {
    const token = await getToken(messaging, { vapidKey: VAPID });
    console.log("TOKEN:", token);
  }
});

// 📩 Send message
window.send = function() {
  const text = document.getElementById("msg").value;
  push(ref(db, "messages"), {
    text: text,
    time: Date.now()
  });
  document.getElementById("msg").value = "";
};

// 📥 Receive messages
onChildAdded(ref(db, "messages"), (data) => {
  const msg = data.val();

  const div = document.createElement("div");
  div.className = "msg";
  div.innerText = msg.text;

  document.getElementById("chat").appendChild(div);
});
</script>

</body>
</html>
